// This is your Prisma schema file,
// learn more about it in the docs: https://pris.ly/d/prisma-schema

generator client {
  provider = "prisma-client-js"
}

datasource db {
  provider = "sqlite"
  url      = env("DATABASE_URL")
}

model User {
  id     String  @id @default(uuid())
  name   String
  pin    String  @unique // 4-digit unique sign-in
  role   String  @default("PLAYER") // "ADMIN" or "PLAYER"
  teamId String?
  team   Team?   @relation(fields: [teamId], references: [id])
  scores Score[]
}

model Team {
  id    String @id @default(uuid())
  name  String
  users User[]
}

model Pub {
  id          String  @id @default(uuid())
  name        String
  description String
  challenge   String
  order       Int
  lat         Float
  lng         Float
  photos      Photo[]
  scores      Score[]
}

model Photo {
  id    String @id @default(uuid())
  url   String
  pubId String
  pub   Pub    @relation(fields: [pubId], references: [id])
}

model Score {
  id      String @id @default(uuid())
  strokes Int
  pubId   String
  userId  String
  pub     Pub    @relation(fields: [pubId], references: [id])
  user    User   @relation(fields: [userId], references: [id])

  @@unique([pubId, userId]) // one score per player per pub
}
